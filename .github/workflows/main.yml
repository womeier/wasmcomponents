name: Nix CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          fetch-depth: 1

      # Install Nix
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # Set up Cachix (replace 'YOUR_CACHE_NAME' with your Cachix cache name)
      - uses: cachix/cachix-action@v12
        with:
          name: womeier
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build
        run: |
          nix build --no-link --print-out-paths | cachix push womeier

      - name: Run test
        run: |
          nix develop .#test-shell --command python3 ./testing/test_parser.py
